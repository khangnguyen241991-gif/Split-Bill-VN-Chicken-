<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split Bill VN (Chicken)</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
      body {
        font-family: Arial;
        background: #0f172a;
        color: #fff;
        margin: 0;
        padding: 20px
      }

      .container {
        display: flex;
        gap: 20px
      }

      .box {
        background: #111827;
        padding: 15px;
        border-radius: 12px;
        border: 1px solid #1f2937
      }

      .left {
        width: 30%
      }

      .right {
        width: 70%
      }

      input,
      select {
        padding: 6px;
        margin: 4px;
        background: #1f2937;
        color: #fff;
        border: none;
        border-radius: 6px;
        text-align: left
      }

      input::placeholder {
        text-align: left
      }

      button {
        padding: 8px 15px;
        margin: 4px;
        border: none;
        border-radius: 6px;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
        font-weight: bold
      }

      .danger {
        background: #dc2626
      }

      .success {
        background: #16a34a
      }

      .warning {
        background: #f59e0b;
        color: #000;
        font-weight: bold
      }

      #peopleTable {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .person-chip {
        display: flex;
        align-items: center;
        background: #1f2937;
        border-radius: 8px;
        padding: 2px 6px;
        border: 1px solid #374151
      }

      .person-chip input {
        width: 90px;
        margin: 0;
        background: transparent;
        border: none;
        color: #ffffff !important;
        font-weight: bold;
      }

      .btn-remove-person {
        color: #dc2626;
        cursor: pointer;
        font-weight: bold;
        padding: 0 4px;
        font-size: 14px;
        margin-left: 4px;
      }

      .table-items {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
        font-size: 14px;
      }

      .table-items th,
      .table-items td {
        border: 1px solid #333;
        padding: 6px;
        text-align: left;
      }

      .table-items th {
        background: #1f2937;
      }

      .draggable-row {
        cursor: move;
      }

      .item-row-content {
        display: flex;
        align-items: center;
        gap: 5px;
        flex-wrap: nowrap;
        white-space: nowrap;
      }

      .input-name {
        color: #fb923c !important;
        font-weight: bold;
        width: 150px;
      }

      .input-price {
        width: 100px;
        color: #ffffff !important;
      }

      .input-qty {
        width: 40px;
      }

      .item-total {
        color: #4ade80 !important;
        font-weight: bold;
        font-size: 12px;
        margin-left: 5px;
      }

      .split-zone {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .action-cell {
        display: flex;
        flex-direction: column;
        gap: 4px;
        width: 55px;
        align-items: center;
        margin: 0;
        padding: 0;
        border: none;
        background: transparent;
        min-height: 60px;
      }

      .btn-mini {
        padding: 2px 0;
        font-size: 9px;
        width: 100%;
        margin: 0;
        border-radius: 2px;
      }

      .name-label {
        font-size: 11px;
        color: #ffffff !important;
        font-weight: bold;
        height: 16px;
        width: 55px;
        overflow: hidden;
        text-align: center;
        white-space: nowrap;
        text-overflow: ellipsis;
        margin-bottom: 2px;
      }

      /* FIX LỖI MẤT SỐ KHI CHỤP HÌNH */
      .input-split {
        width: 45px !important;
        padding: 2px 0 !important;
        /* Giảm padding ngang về 0 để số có chỗ đứng */
        font-size: 13px !important;
        color: white !important;
        font-weight: bold !important;
        text-align: center !important;
        /* Căn giữa số */
        background: #1f2937 !important;
        border-radius: 4px !important;
      }

      .btn-split-row {
        padding: 4px 8px;
        font-size: 10px;
        width: 55px;
        margin: 2px auto;
        display: block;
      }

      .summary-row {
        display: flex;
        gap: 20px;
        margin-top: 20px;
      }

      #result {
        flex: 1.5;
        background: #1e293b;
        padding: 15px;
        border-radius: 12px;
        border: 1px solid #334155;
        display: grid;
        grid-template-columns: 1fr 1.2fr;
        gap: 15px;
        font-size: 15px;
        line-height: 1.6;
        color: #ffffff !important; /* ÉP CHỮ TRẮNG */
      }

      .res-col {
        color: #ffffff !important; /* ÉP CHỮ TRẮNG CHO CỘT */
      }

      .res-col b {
        font-size: 16px;
        color: #facc15 !important; /* GIỮ MÀU VÀNG CHO TIÊU ĐỀ */
        display: block;
        margin-bottom: 8px;
        border-bottom: 1px solid #334155;
      }

      .money-line {
        font-weight: bold;
        font-size: 16px;
      }

      .text-green {
        color: #4ade80 !important;
      }

      .text-orange {
        color: #fb923c !important;
      }

      .paid-container {
        flex: 0.8;
        background: #1e293b;
        padding: 15px;
        border-radius: 12px;
        border: 1px solid #475569;
      }

      .paid-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 6px;
      }

      .paid-row span {
        min-width: 80px;
        font-weight: bold;
        color: #fff !important; /* ÉP TRẮNG TÊN NGƯỜI TRẢ TRƯỚC */
        font-size: 14px;
      }

      .paid-row input {
        width: 110px;
        background: #fff !important;
        color: #000 !important;
        font-weight: bold;
        padding: 3px 5px;
      }

      .img-container {
        position: relative;
        display: inline-block;
        margin-top: 10px;
        width: 100%;
        border: 2px dashed #374151;
        border-radius: 10px;
        min-height: 100px;
        text-align: center;
        overflow: visible;
      }

      #preview {
        max-width: 100%;
        border-radius: 8px;
        display: none;
        margin: 0 auto;
      }

      .btn-remove-img {
        position: absolute;
        top: -10px;
        right: -10px;
        background: #dc2626;
        color: white;
        border: 2px solid #fff;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        cursor: pointer;
        display: none;
        font-weight: bold;
        z-index: 100;
        line-height: 20px;
        padding: 0;
      }

      @media (max-width:900px) {

        .container,
        .summary-row,
        #result {
          flex-direction: column;
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div style="display:flex; justify-content:space-between; align-items:center">
      <h2 style="margin:5px 0">💰 Split Bill VN (Chicken)</h2>
      <div>
        <button class="warning" onclick="exportData()">📤 Xuất file</button>
        <button class="warning" onclick="document.getElementById('importFile').click()">📥 Nhập file</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(this)">
        <button class="success" onclick="takeScreenshot()">📸 Tải ảnh</button>
        <button class="danger" onclick="resetAll()">🔄 Xóa hết</button>
      </div>
    </div>
    <div id="captureArea" style="background: #0f172a; padding: 15px;">
      <div class="container">
        <div class="box left" id="dropZone">
          <h3>📸 Hóa đơn</h3>
          <input type="file" id="imgInput" accept="image/*">
          <div class="img-container" id="imgContainer">
            <div id="dropText" style="padding:40px 10px; color:#64748b">Kéo thả ảnh vào đây</div>
            <button id="removeImgBtn" class="btn-remove-img" onclick="clearImage()">X</button>
            <img id="preview">
          </div>
        </div>
        <div class="box right">
          <h3>👥 Người tham gia</h3>
          <div id="peopleTable"></div>
          <button onclick="addPerson()">+ Thêm Người</button>
          <h3>🍺 Danh sách món</h3>
          <div style="display:flex; align-items:center; flex-wrap:wrap">
            <input id="name" style="width:180px" placeholder="Tên món">
            <input id="price" style="width:110px" placeholder="Đơn giá" oninput="formatInput(this)">
            <input id="qty" style="width:40px" type="number" value="1">
            <button onclick="addItem()" class="success">Thêm Món</button>
          </div>
          <table class="table-items">
            <thead>
              <tr>
                <th width="30%">Thông tin món</th>
                <th width="60%">Người dùng & Chia tiền</th>
                <th width="10%"></th>
              </tr>
            </thead>
            <tbody id="items"></tbody>
          </table>
          <div style="display:flex; gap:8px; margin-top:20px; align-items: center; flex-wrap: wrap;">
            <b>🏷️ Discount:</b>
            <input id="discountInput" style="width:110px" placeholder="Tiền / %" oninput="formatInput(this)">
            <select id="discountType">
              <option value="money">VNĐ</option>
              <option value="percent">%</option>
            </select>
            <select id="discountApply">
              <option value="before">Trước thuế</option>
              <option value="after">Sau thuế</option>
            </select>
            <button onclick="applyDiscount()">Áp dụng</button>
            <button id="clearDiscBtn" class="danger" style="display:none; padding:5px 12px" onclick="clearDiscount()">X</button>
            <b style="margin-left:10px">🧾 Thuế:</b>
            <input id="taxName" style="width:90px" placeholder="VAT...">
            <input id="taxRate" style="width:45px" type="number" placeholder="%">
            <button onclick="addTax()">+ Thuế</button>
            <div id="taxes-list" style="display:flex; gap:5px"></div>
          </div>
          <div class="summary-row">
            <div id="result"></div>
            <div class="paid-container">
              <h4 style="margin:0 0 10px 0">💳 Đã trả trước</h4>
              <div id="paidBox"></div>
            </div>
          </div>
          <button style="width:100%; margin-top:15px" class="success" onclick="copyResult()">📋 Copy Kết quả</button>
        </div>
      </div>
    </div>
    <script>
      let people = [],
        items = [],
        taxes = [],
        paid = {},
        discount = 0,
        discountType = 'money',
        discountApply = 'before';
      let activeFocusId = null;

      function formatInput(el) {
        let val = el.value.replace(/\D/g, "");
        if (val === "") return;
        el.value = Number(val).toLocaleString('vi-VN');
      }

      function parseMoney(val) {
        return parseFloat(String(val).replace(/\./g, "")) || 0;
      }

      function vnd(n) {
        return Math.round(n).toLocaleString('vi-VN') + 'đ';
      }

      function saveToLocal() {
        const data = {
          people,
          items,
          taxes,
          paid,
          discount,
          discountType,
          discountApply
        };
        localStorage.setItem('splitBillData', JSON.stringify(data));
      }
      const dropZone = document.getElementById('dropZone');
      dropZone.ondragover = e => {
        e.preventDefault();
        dropZone.style.borderColor = '#2563eb';
      };
      dropZone.ondragleave = () => {
        dropZone.style.borderColor = '#1f2937';
      };
      dropZone.ondrop = e => {
        e.preventDefault();
        dropZone.style.borderColor = '#1f2937';
        handleImage(e.dataTransfer.files[0]);
      };
      document.getElementById('imgInput').onchange = e => handleImage(e.target.files[0]);

      function handleImage(f) {
        if (f && f.type.startsWith('image/')) {
          let r = new FileReader();
          r.onload = ev => {
            localStorage.setItem('savedBill', ev.target.result);
            showImg(ev.target.result);
          };
          r.readAsDataURL(f);
        }
      }

      function showImg(src) {
        let p = document.getElementById('preview');
        p.src = src;
        p.style.display = 'block';
        document.getElementById('removeImgBtn').style.display = 'block';
        document.getElementById('dropText').style.display = 'none';
        document.getElementById('imgContainer').style.border = 'none';
      }

      function clearImage() {
        localStorage.removeItem('savedBill');
        document.getElementById('preview').style.display = 'none';
        document.getElementById('removeImgBtn').style.display = 'none';
        document.getElementById('dropText').style.display = 'block';
        document.getElementById('imgContainer').style.border = '2px dashed #374151';
      }

      function addPerson() {
        people.push('');
        render();
        setTimeout(() => {
          let inputs = document.querySelectorAll('#peopleTable input');
          if (inputs.length) inputs[inputs.length - 1].focus();
        }, 50);
      }

      function removePerson(i) {
        people.splice(i, 1);
        render();
      }

      function addItem() {
        let n = document.getElementById('name'),
          p = document.getElementById('price'),
          q = document.getElementById('qty');
        let priceVal = parseMoney(p.value);
        if (!n.value || !priceVal) {
          alert('Thiếu tên món hoặc giá kìa!');
          return;
        }
        items.push({
          name: n.value,
          price: priceVal,
          qty: parseFloat(q.value) || 1,
          alloc: {},
          active: new Array(people.length).fill(true)
        });
        n.value = '';
        p.value = '';
        q.value = 1;
        render();
        n.focus();
      }

      function applyDiscount() {
        discount = parseMoney(document.getElementById('discountInput').value);
        discountType = document.getElementById('discountType').value;
        discountApply = document.getElementById('discountApply').value;
        document.getElementById('discountInput').value = '';
        document.getElementById('clearDiscBtn').style.display = discount > 0 ? 'inline-block' : 'none';
        render();
      }

      function clearDiscount() {
        discount = 0;
        document.getElementById('discountInput').value = '';
        document.getElementById('clearDiscBtn').style.display = 'none';
        render();
      }

      function addTax() {
        let n = document.getElementById('taxName'),
          r = document.getElementById('taxRate');
        if (!n.value || !r.value) {
          alert('Nhập đủ tên thuế và % giùm cái!');
          return;
        }
        taxes.push({
          name: n.value,
          rate: parseFloat(r.value)
        });
        n.value = '';
        r.value = '';
        render();
      }

      function calc() {
        let subtotal = 0,
          per = new Array(people.length).fill(0);
        items.forEach(it => {
          let t = it.price * it.qty;
          subtotal += t;
          let sum = 0;
          for (let k in it.alloc) {
            if (it.alloc[k] > 0) sum += it.alloc[k];
          }
          if (sum > 0) {
            people.forEach((p, i) => {
              if (it.alloc[i] > 0) per[i] += t * (it.alloc[i] || 0) / sum;
            });
          }
        });
        let running = subtotal,
          taxText = '',
          discVal = 0;
        const getD = (b) => discountType === 'percent' ? b * discount / 100 : discount;
        if (discountApply === 'before') {
          discVal = Math.min(getD(subtotal), subtotal);
          running -= discVal;
          taxes.forEach(t => {
            let add = running * t.rate / 100;
            running += add;
            taxText += `${t.name} ${t.rate}%: ${vnd(add)}
														
														<br>`;
          });
        } else {
          taxes.forEach(t => {
            let add = running * t.rate / 100;
            running += add;
            taxText += `${t.name} ${t.rate}%: ${vnd(add)}
															
															<br>`;
          });
          discVal = Math.min(getD(running), running);
          running -= discVal;
        }
        let ratio = subtotal > 0 ? running / subtotal : 1;
        let htmlLeft = `
																
																<div class="res-col">
																	<b>🧾 CHI TIẾT</b>`;
        let discLabel = (discountType === 'percent' && discount > 0) ? `Discount (${discountApply==='before'?'Trước':'Sau'} thuế) ${discount}%` : `Discount (${discountApply==='before'?'Trước':'Sau'} thuế)`;
        let discRow = discount > 0 ? `${discLabel}: -${vnd(discVal)}
																	
																	<br>` : '';
        htmlLeft += `Tạm tính: ${vnd(subtotal)}
																		
																		<br>${discRow}${taxText}
																			
																			<span class="money-line">Tổng: ${vnd(running)}</span>
																			<br>
																				<br>`;
        people.forEach((p, i) => {
          if (per[i] > 0) htmlLeft += `${p||'...'}: ${vnd(per[i]*ratio)}
																				
																					<br>`;
        });
        htmlLeft += `
																				
																					</div>`;
        let htmlRight = `
																				
																					<div class="res-col">
																						<b>💸 THANH TOÁN</b>`;
        people.forEach((p, i) => {
          let bal = (paid[i] || 0) - (per[i] * ratio);
          if (Math.abs(bal) < 1) return;
          if (bal > 0) htmlRight += `${p||'...'}: 
																						
																						<span class="money-line text-green">nhận ${vnd(bal)}</span>
																						<br>`;
          else htmlRight += `${p||'...'}: 
																							
																							<span class="money-line text-orange">thêm ${vnd(-bal)}</span>
																							<br>`;
        });
        htmlRight += `
																							
																							</div>`;
        document.getElementById('result').innerHTML = htmlLeft + htmlRight;
      }

      function render() {
        let phtml = '';
        people.forEach((p, i) => {
          phtml += `
																							
																							<div class="person-chip">
																								<input id="p-input-${i}" value="${p}" 
                   onfocus="activeFocusId=this.id" 
                   onblur="activeFocusId=null" 
                   oninput="people[${i}]=this.value; saveToLocal(); calc();"
                   onchange="render()">
																									<span class="btn-remove-person" onclick="removePerson(${i})">×</span>
																								</div>`;
        });
        document.getElementById('peopleTable').innerHTML = phtml;
        let ihtml = '';
        items.forEach((it, i) => {
          let sortedIndices = people.map((_, idx) => idx).sort((a, b) => it.active[b] - it.active[a]);
          let allocHtml = '';
          sortedIndices.forEach(idx => {
            let act = it.active[idx];
            let val = it.alloc[idx] !== undefined ? it.alloc[idx] : "";
            allocHtml += `
																								
																								<div class="action-cell" style="opacity:${act?1:0.3}">
																									<div class="name-label">${people[idx]||'...'}</div>
                ${act?`
																									
																									<input class="input-split" type="number" placeholder="0" value="${val}" oninput="items[${i}].alloc[${idx}]=parseFloat(this.value); calc();">`:`
																										
																										<div style="height:20px"></div>`}
                
																										
																										<button class="btn-mini" style="background:${act?'#475569':'#16a34a'}" onclick="toggleActive(${i}, ${idx})">${act?'Bỏ':'Dùng'}</button>
																									</div>`;
          });
          ihtml += `
																									
																									<tr class="draggable-row" draggable="true" ondragstart="dragStart(${i})" ondragover="dragOver(event)" ondrop="dragDrop(${i})">
																										<td>
																											<div class="item-row-content">
																												<input class="input-name" value="${it.name}" onchange="items[${i}].name=this.value; render();">
																													<input class="input-price" value="${it.price.toLocaleString('vi-VN')}" oninput="formatInput(this)" onchange="items[${i}].price=parseMoney(this.value); render();"> x 
                    
																														
																														<input class="input-qty" type="number" value="${it.qty}" onchange="items[${i}].qty=parseFloat(this.value)||1; render();">
																															<span class="item-total">= ${vnd(it.price*it.qty)}</span>
																														</div>
																													</td>
																													<td>
																														<div class="split-zone">${allocHtml}</div>
																													</td>
																													<td style="text-align:center">
																														<button class="success btn-split-row" onclick="splitRow(${i})">Split</button>
																														<button class="danger btn-split-row" onclick="items.splice(${i},1); render();">Xóa</button>
																													</td>
																												</tr>`;
        });
        document.getElementById('items').innerHTML = ihtml;
        let thtml = '';
        taxes.forEach((t, i) => {
          thtml += `
																												
																												<button class='warning' style="font-size:10px; padding:2px 6px" onclick="taxes.splice(${i},1); render();">${t.name} ${t.rate}% x</button> `;
        });
        document.getElementById('taxes-list').innerHTML = thtml;
        let payHTML = '';
        people.forEach((p, i) => {
          payHTML += `
																												
																												<div class="paid-row">
																													<span>${p||'...'}:</span>
																													<input value="${(paid[i]||0).toLocaleString('vi-VN')}" oninput="formatInput(this)" onchange="paid[${i}]=parseMoney(this.value); calc();">
																													</div>`;
        });
        document.getElementById('paidBox').innerHTML = payHTML;
        saveToLocal();
        calc();
        if (activeFocusId) {
          let el = document.getElementById(activeFocusId);
          if (el) {
            let val = el.value;
            el.focus();
            el.value = '';
            el.value = val;
          }
        }
      }

      function toggleActive(itemIdx, personIdx) {
        let it = items[itemIdx];
        it.active[personIdx] = !it.active[personIdx];
        if (!it.active[personIdx]) {
          delete it.alloc[personIdx];
        }
        render();
      }

      function splitRow(idx) {
        let it = items[idx];
        it.active.forEach((act, pIdx) => {
          if (act) it.alloc[pIdx] = 1;
          else delete it.alloc[pIdx];
        });
        render();
      }
      let dragIdx = null;

      function dragStart(i) {
        dragIdx = i;
      }

      function dragOver(e) {
        e.preventDefault();
      }

      function dragDrop(i) {
        const item = items.splice(dragIdx, 1)[0];
        items.splice(i, 0, item);
        render();
      }

      function takeScreenshot() {
        const area = document.getElementById('captureArea');
        const btns = area.querySelectorAll('button, input[type=\"file\"]');
        btns.forEach(b => b.style.visibility = 'hidden');
        html2canvas(area, {
          backgroundColor: "#0f172a",
          scale: 2,
          useCORS: true,
          logging: false
        }).then(canvas => {
          const link = document.createElement('a');
          const d = new Date().toISOString().slice(0, 10).split('-');
          const date = `${d[2]}-${d[1]}-${d[0]}`;
          link.download = `Split_Bill_${date}.png`;
          link.href = canvas.toDataURL();
          link.click();
          btns.forEach(b => b.style.visibility = 'visible');
        });
      }

      function copyResult() {
        let text = document.getElementById('result').innerText.replace(/\\n\\n/g, '\\n');
        navigator.clipboard.writeText(text);
        alert("Đã copy!");
      }

      function resetAll() {
        if (confirm("Xóa hết?")) {
          localStorage.clear();
          location.reload();
        }
      }

      function exportData() {
        let d = JSON.stringify({
          people,
          items,
          taxes,
          paid
        });
        let blob = new Blob([d], {
          type: 'application/json'
        });
        let a = document.createElement('a');
        const dt = new Date().toISOString().slice(0, 10).split('-');
        const date = `${dt[2]}-${dt[1]}-${dt[0]}`;
        a.href = URL.createObjectURL(blob);
        a.download = `Bill_Data_${date}.json`;
        a.click();
      }

      function importData(input) {
        let r = new FileReader();
        r.onload = e => {
          let d = JSON.parse(e.target.result);
          people = d.people;
          items = d.items;
          taxes = d.taxes;
          paid = d.paid;
          render();
        };
        r.readAsText(input.files[0]);
      }
      window.onload = () => {
        let saved = localStorage.getItem('splitBillData');
        if (saved) {
          let d = JSON.parse(saved);
          people = d.people;
          items = d.items;
          taxes = d.taxes;
          paid = d.paid;
          discount = d.discount || 0;
          discountType = d.discountType || 'money';
          discountApply = d.discountApply || 'before';
          if (discount > 0) {
            document.getElementById('clearDiscBtn').style.display = 'inline-block';
          }
        }
        let img = localStorage.getItem('savedBill');
        if (img) showImg(img);
        render();
      };
    </script>
  </body>
</html>
